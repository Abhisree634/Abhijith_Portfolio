<body>
          <!-- Added the id="hero-bg" here -->
    <div class="hero-wrapper" id="hero-bg">
        <nav>
            <div class="nav__content">

                <ul class="nav__links">

                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>   
           </div>
        </nav>

        <section class="section">
            <div class="section__container">
                <div class="content">
                    <p class="subtitle">WELCOME</p>

                       Respecting the roots, reaching for the stars

    <!-- JavaScript for Automatic Background Change -->
    <script>
        const images = [
            "https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?auto=format&fit=crop&w=1920&q=80", // Kerala
            "https://images.unsplash.com/photo-1582510003544-4d00b7f74220?auto=format&fit=crop&w=1920&q=80", // Tamil Nadu
            "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1920&q=80"  // Dubai
        ];

        let currentIndex = 0;
        const heroWrapper = document.getElementById('hero-bg');

        function changeWallpaper() {
            heroWrapper.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }

        // Change every 7 seconds
        setInterval(changeWallpaper, 7000);
        changeWallpaper();
    </script>
</body>
