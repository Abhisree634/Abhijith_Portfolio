<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Abhijith K S</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            overflow: hidden;
        }

        /* Ambient Background Glow */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(37, 99, 235, 0.15);
            filter: blur(100px);
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        /* Upper Right Navigation */
        .profile-nav {
            position: fixed;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 10px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            z-index: 1000;
        }

        .profile-nav a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .profile-nav a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .profile-nav a.active {
            color: #fff;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* Contact Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: #64748b;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .success-msg {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .profile-nav { 
                top: 20px; 
                right: 20px; 
                left: 20px; 
                justify-content: center;
            }
            .glass-card { padding: 40px 25px; margin-top: 60px; }
        }
    </style>
</head>
<body>

    <nav class="profile-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="blog.html" class="active">Blog</a>
    </nav>

    <div class="glass-card">
        <h1>Connect with Abhijith</h1>
        <p>Send a direct message to my workspace.</p>

        <form id="contact-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="Your Name">
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@email.com">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="4" required placeholder="How can I help you?"></textarea>
            </div>

            <button type="submit" id="submit-btn">
                Send Message <i class="ri-send-plane-2-line"></i>
            </button>

            <div id="success" class="success-msg">
                <i class="ri-checkbox-circle-fill"></i> Message sent successfully!
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("-ukpEPK55TOjkJa4P");
        })();

        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const btn = document.getElementById("submit-btn");
            const success = document.getElementById("success");
            
            btn.innerHTML = 'Sending... <i class="ri-loader-line"></i>';
            btn.disabled = true;

            const params = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                message: document.getElementById("message").value,
            };

            emailjs.send("service_840p0np", "template_vhd2ckz", params)
                .then(() => {
                    btn.innerHTML = 'Sent <i class="ri-check-line"></i>';
                    success.style.display = "block";
                    document.getElementById("contact-form").reset();
                    setTimeout(() => {
                        success.style.display = "none";
                        btn.innerHTML = 'Send Message <i class="ri-send-plane-2-line"></i>';
                        btn.disabled = false;
                    }, 5000);
                })
                .catch((err) => {
                    alert("Error: " + JSON.stringify(err));
                    btn.innerHTML = 'Send Message <i class="ri-send-plane-2-line"></i>';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
